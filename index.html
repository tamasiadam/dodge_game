<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dodge - The Game</title>
</head>
<body>

    <div id="game-container">
        <div id="score-display">Pont: <span id="score">0</span></div>
        <p id="highscore-display" class="hidden">Rekord: <span id="highscore">-</span></p>
        <div id="player"></div>
        
        <div id="ui-screen">
            <h1 id="game-title">Dodge</h1>
            <p id="final-score" class="hidden">Pontszám: <span>0</span></p>
            
            <p style="margin-bottom: 20px;">Irányítás: <b>Balra / Jobbra nyíl</b></p>
            <button id="start-btn">Játék Indítása</button>
        </div>
    </div>

</body>
<script src="script.js"></script>
</html>
